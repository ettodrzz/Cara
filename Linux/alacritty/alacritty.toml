[env]
TERM = "xterm-256color"

[window.padding]
x = 4
y = 4

[font]
size = 11
[font.normal]
family = "Hack"

[colors.primary]
background = "#000000"
foreground = "#f9ecd4"
bright_foreground = "#ffeac3"
[colors.normal]
black = "#303030"
red = "#d9ad94"
green = "#c3d994"
yellow = "#d9b911"
blue = "#1185d9"
magenta = "#d911b9"
cyan = "#94d9b8"
white = "#e0e0e0"
[colors.bright]
black = "#606060"
red = "#ffcbae"
green = "#e5ffae"
yellow = "#ffd914"
blue = "#149cff"
magenta = "#ff14d9"
cyan = "#aeffd8"
white = "#ffffff"

[cursor.style]
blinking = "On"

[mouse]
hide_when_typing = true
